<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Podaci o filmovima">
    <title>Podaci o Filmovima</title>

    <link rel="stylesheet" href="style.css">

    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
    <h1>Podaci o Filmovima</h1>

    <label for="menu-toggle" class="menu-label">☰</label>
    <input type="checkbox" id="menu-toggle" class="menu-toggle">

    <nav>
        <ul class="nav-menu">
            <li><a href="index.html">Početna</a></li>
            <li><a href="grafikon.html">Grafikon</a></li>
            <li><a href="/slike">Galerija</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="data-section">
    <h1>Popis filmova</h1>

    <!-- FILTERI -->
    <div id="filteri">
        <input type="text" id="filter-naziv" placeholder="Naziv filma">

        <select id="filter-zanr">
            <option value="">Svi žanrovi</option>
        </select>

        <input type="number" id="godina-od" placeholder="Godina od">
        <input type="number" id="godina-do" placeholder="Godina do">

        <input type="text" id="filter-drzava" placeholder="Država">

        <input type="range" id="filter-ocjena" min="0" max="10" step="0.1" value="5">
        <span id="ocjena-value">5</span>

        <button id="filtriraj">Filtriraj</button>

        <select id="sortiranje">
            <option value="">Sortiraj</option>
            <option value="godina">Godina</option>
            <option value="ocjena">Ocjena</option>
        </select>
    </div>

    <div class="data-container">

        <!-- TABLICA -->
        <table id="filmovi-tablica">
            <thead>
                <tr>
                    <th>Naslov</th>
                    <th>Godina</th>
                    <th>Žanr</th>
                    <th>Trajanje</th>
                    <th>Država</th>
                    <th>Ocjena</th>
                    <th>Akcija</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- KOŠARICA -->
        <aside id="kosarica">
            <h2>Košarica</h2>
            <ul id="lista-kosarice"></ul>
            <button id="potvrdi">Potvrdi posudbu</button>
        </aside>

    </div>
</section>

</main>

<footer>
    <p>&copy; 2025. Web Programiranje</p>
</footer>

<script src="script.js"></script>
</body>
</html>
